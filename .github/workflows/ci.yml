name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm test
        env:
          # Tests use these as placeholders — no real keys are required.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'test-openrouter-key' }}
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY || 'test-googleai-key' }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY || 'test-minimax-key' }}
